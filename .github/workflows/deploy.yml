name: Deploy naar GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: RenCo/package-lock.json

      - name: Install dependencies 🔧
        working-directory: RenCo
        run: npm ci

      - name: Build project 🏗️
        working-directory: RenCo
        run: npm run build

      - name: Deploy naar GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: RenCo/dist